version: "3.8"

services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: vitalpulse-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - vitalpulse-net

  mysql:
    image: mysql:8.0
    container_name: vitalpulse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: vitalpulse
      MYSQL_DATABASE: vitalpulse
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    networks:
      - vitalpulse-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: vitalpulse-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - vitalpulse-net

  neo4j:
    image: neo4j:5
    container_name: vitalpulse-neo4j
    environment:
      NEO4J_AUTH: neo4j/vitalpulse
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    networks:
      - vitalpulse-net

  publisher:
    build: ./publisher
    container_name: vitalpulse-publisher
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
    networks:
      - vitalpulse-net

  subscriber:
    build: ./subscriber
    container_name: vitalpulse-subscriber
    depends_on:
      mosquitto:
        condition: service_started
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
      neo4j:
        condition: service_started
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: vitalpulse
      MYSQL_DB: vitalpulse
      MONGO_URI: mongodb://mongodb:27017
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: vitalpulse
    networks:
      - vitalpulse-net

volumes:
  mysql-data:
  mongo-data:
  neo4j-data:

networks:
  vitalpulse-net:
    driver: bridge
